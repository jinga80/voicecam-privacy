const dec=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
let pwMem='', cache={};
async function open(lang,pw){
  const p=P[lang], enc=new TextEncoder();
  const bk=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:dec(p.salt),iterations:p.iter,hash:'SHA-256'},
    bk,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:dec(p.iv)},key,dec(p.ct));
  return new TextDecoder().decode(pt);
}
const frame=document.getElementById('frame');
function show(lang){
  frame.srcdoc=cache[lang];
  document.getElementById('bEn').classList.toggle('on',lang==='en');
  document.getElementById('bKo').classList.toggle('on',lang==='ko');
  frame.onload=()=>{ try{frame.contentWindow.focus();}catch(_){} };
}
async function toggle(lang){
  if(!cache[lang]){ try{ cache[lang]=await open(lang,pwMem);}catch(_){return;} }
  show(lang);
}
document.getElementById('f').addEventListener('submit',async(e)=>{
  e.preventDefault();
  const err=document.getElementById('err'); err.textContent='';
  const pw=document.getElementById('pw').value;
  try{
    cache.en=await open('en',pw); pwMem=pw;
    document.getElementById('gate').style.display='none';
    document.getElementById('app').style.display='block';
    show('en');
  }catch(_){ err.textContent='Incorrect password.'; }
});
document.getElementById('bEn').addEventListener('click',()=>toggle('en'));
document.getElementById('bKo').addEventListener('click',()=>toggle('ko'));
document.getElementById('bPr').addEventListener('click',()=>{ try{frame.contentWindow.focus();frame.contentWindow.print();}catch(_){} });
</script>
