<!doctype html><html lang="ko"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Gothic+A1:wght@700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1200px;height:630px;overflow:hidden}
  body{position:relative;font-family:'Gothic A1',sans-serif;
    background:
      radial-gradient(120% 120% at 76% 18%, rgba(232,160,124,.42) 0%, rgba(108,58,82,.30) 32%, rgba(20,16,30,0) 62%),
      radial-gradient(90% 90% at 12% 96%, rgba(216,166,87,.18) 0%, rgba(20,16,30,0) 55%),
      #1A1524;
    color:#EDE6F0}
  .stars i{position:absolute;width:4px;height:4px;border-radius:50%;background:#F4ECE1;opacity:.5;box-shadow:0 0 8px 1px rgba(244,236,225,.5)}
  .pad{position:absolute;inset:0;padding:66px 80px;display:flex;align-items:flex-start;gap:20px}
  .col{flex:1;max-width:660px;padding-top:22px}
  .eyebrow{font-weight:800;font-size:21px;letter-spacing:.18em;color:#D8A657;text-transform:uppercase}
  h1{font-family:'Gowun Batang',serif;font-weight:700;font-size:64px;line-height:1.26;letter-spacing:-.01em;margin:20px 0 20px}
  h1 .soft{color:#E8A07C}
  p{font-size:25px;line-height:1.58;color:#CBBFD6;max-width:540px}
  .brand{position:absolute;left:80px;bottom:60px;display:flex;align-items:center;gap:14px;font-weight:800;font-size:26px;color:#F4ECE1;letter-spacing:.01em}
  .brand small{display:block;font-weight:700;font-size:16px;letter-spacing:.14em;color:#A99DB5;text-transform:uppercase}
  .art{width:400px;height:400px;flex:none;filter:drop-shadow(0 22px 46px rgba(232,160,124,.42))}
  .chip{position:absolute;right:80px;bottom:62px;font-weight:700;font-size:18px;color:#CDBBA0;background:rgba(216,166,87,.12);border:1px solid rgba(216,166,87,.34);border-radius:999px;padding:11px 20px}
</style></head><body>
<div class="stars">
  <i style="left:9%;top:20%"></i><i style="left:20%;top:64%;width:3px;height:3px"></i><i style="left:30%;top:30%"></i>
  <i style="left:52%;top:16%;width:3px;height:3px"></i><i style="left:62%;top:74%"></i><i style="left:88%;top:34%;width:3px;height:3px"></i>
  <i style="left:94%;top:66%"></i><i style="left:44%;top:86%;width:3px;height:3px"></i>
</div>
<div class="pad">
  <div class="col">
    <div class="eyebrow">감정일기 · 하루 성찰</div>
    <h1>하루의 끝에서,<br><span class="soft">오늘의 마음</span>을<br>돌아봐요</h1>
    <p>달빛 친구 <b style="color:#E4906B">마루</b>와 AI가 하루를<br>함께 돌아봐 줍니다.</p>
  </div>
  <svg class="art" viewBox="0 0 200 200" aria-label="달빛 친구 마루">
    <defs>
      <radialGradient id="moonG" cx="38%" cy="34%" r="78%">
        <stop offset="0%" stop-color="#F6B48E"/><stop offset="55%" stop-color="#E4906B"/><stop offset="100%" stop-color="#C6764F"/>
      </radialGradient>
      <mask id="cres"><circle cx="98" cy="106" r="66" fill="#fff"/><circle cx="140" cy="70" r="54" fill="#000"/></mask>
    </defs>
    <circle cx="98" cy="106" r="74" fill="#E4906B" opacity=".16"/>
    <circle cx="98" cy="106" r="66" fill="url(#moonG)" mask="url(#cres)"/>
    <ellipse cx="70" cy="126" rx="9" ry="6" fill="#F6A985" opacity=".65"/>
    <ellipse cx="112" cy="132" rx="9" ry="6" fill="#F6A985" opacity=".65"/>
    <path d="M120 158q7-9 14 0q7 9 14 0" stroke="#F4ECE1" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M150 52l2 6l6 2l-6 2l-2 6l-2-6l-6-2l6-2Z" fill="#D8A657"/>
    <circle cx="72" cy="112" r="6.2" fill="#3A2030"/><circle cx="74.4" cy="109.4" r="2" fill="#F4ECE1"/>
    <circle cx="112" cy="116" r="6.2" fill="#3A2030"/><circle cx="114.4" cy="113.4" r="2" fill="#F4ECE1"/>
    <path d="M80 129q16 18 33 2" stroke="#3A2030" stroke-width="5" fill="none" stroke-linecap="round"/>
  </svg>
</div>
<div class="brand">
  <svg width="46" height="46" viewBox="0 0 108 108"><rect width="108" height="108" rx="24" fill="#241B33"/><path d="M56 24C31 29 27 67 50 80C41 66 43 40 60 33C56 31 55 27 56 24Z" fill="#E4906B"/><path d="M50 64q8-11 16 0q8 11 16 0" stroke="#F4ECE1" stroke-width="5.5" stroke-linecap="round" fill="none"/></svg>
  <div>내마음저장소<small>코리아세일즈</small></div>
</div>
<div class="chip">🔒 내 폰에만 저장 · 서버를 거치지 않아요</div>
</body></html>
